{% extends "portal/base.html" %}

{% block content %}
<section class="form-page">
    <h1>Claim Request for {{ item.name }}</h1>
    <p class="muted">Provide correct details so the admin can verify ownership.</p>
    <form method="post" class="app-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Send Claim Request</button>
    </form>
</section>
{% endblock %}
